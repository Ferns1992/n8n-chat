services:
  n8n-chat:
    build: .
    container_name: n8n-chat-app
    ports:
      - "4090:4090"
    volumes:
      - chat-data:/app/data
    environment:
      - NODE_ENV=production
      # Set your n8n webhook URL here
      - N8N_WEBHOOK_URL=https://n8n.sysitadmin.com/webhook/9e5a8ed5-e4e3-4a79-828f-a05430652fab/chat
    restart: unless-stopped

volumes:
  chat-data:
